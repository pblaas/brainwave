<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enophone Brainwave Demo 29 - Hyperspace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000005; 
            overflow: hidden; 
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        #info {
            position: fixed;
            top: 24px;
            left: 24px;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            letter-spacing: 0.5px;
            z-index: 10;
            pointer-events: none;
            text-transform: uppercase;
        }
        #channels {
            margin-top: 8px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
        }
        #status {
            position: fixed;
            top: 24px;
            right: 24px;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            letter-spacing: 0.5px;
            z-index: 10;
            pointer-events: none;
            text-transform: uppercase;
        }
        .connected { color: #00ffaa !important; }
        .disconnected { color: #ff4466 !important; }
    </style>
</head>
<body>
    <div id="info">
        <div>Hyperspace</div>
        <div id="channels"></div>
    </div>
    <div id="status">Connecting...</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const channelsEl = document.getElementById('channels');
        const statusEl = document.getElementById('status');

        let ws = null;
        let targetChannelMeans = { A1: 0, C3: 0, C4: 0, A2: 0 };
        let channelMeans = { A1: 0, C3: 0, C4: 0, A2: 0 };
        let time = 0;
        const smoothFactor = 0.05;

        const warpStars = [];
        const gridLines = [];
        const streaks = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class WarpStar {
            constructor() {
                this.reset();
            }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 3;
                this.x = Math.cos(angle) * radius;
                this.y = Math.sin(angle) * radius;
                this.z = 2000 + Math.random() * 3000;
                this.baseSpeed = 8 + Math.random() * 12;
                this.size = 1 + Math.random() * 2;
                this.color = Math.random() > 0.5 ? '#ffffff' : '#aaddff';
            }
            update(speedMult) {
                this.z -= this.baseSpeed * speedMult;
                if (this.z <= 10) this.reset();
            }
            draw(speedMult) {
                const perspective = 800 / this.z;
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                
                const sx = cx + this.x * perspective;
                const sy = cy + this.y * perspective;
                
                const streakLength = (this.baseSpeed * speedMult * 3) * perspective;
                const alpha = Math.min(1, (2000 / this.z) * 0.8);
                
                const angle = Math.atan2(this.y, this.x);
                
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx - Math.cos(angle) * streakLength, sy - Math.sin(angle) * streakLength);
                ctx.strokeStyle = this.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba').replace('#', '');
                
                if (this.color === '#ffffff') {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                } else {
                    ctx.strokeStyle = `rgba(150, 200, 255, ${alpha})`;
                }
                
                ctx.lineWidth = Math.max(0.5, this.size * perspective * 2);
                ctx.stroke();
            }
        }

        class GridLine {
            constructor(isHorizontal) {
                this.isHorizontal = isHorizontal;
                this.reset();
            }
            reset() {
                this.z = 1000 + Math.random() * 2000;
                this.offset = (Math.random() - 0.5) * 4;
                this.baseSpeed = 8;
            }
            update(speedMult) {
                this.z -= this.baseSpeed * speedMult;
                if (this.z <= 10) this.reset();
            }
            draw(speedMult) {
                const perspective = 800 / this.z;
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const maxDist = Math.max(canvas.width, canvas.height);
                
                const alpha = Math.min(0.6, (1500 / this.z) * 0.5) * (0.3 + speedMult * 0.3);
                
                ctx.strokeStyle = `rgba(100, 180, 255, ${alpha})`;
                ctx.lineWidth = Math.max(1, 3 * perspective);
                
                if (this.isHorizontal) {
                    const y = cy + this.offset * perspective;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                } else {
                    const x = cx + this.offset * perspective;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
            }
        }

        class WarpStreak {
            constructor() {
                this.reset();
            }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const radius = 0.5 + Math.random() * 2;
                this.x = Math.cos(angle) * radius;
                this.y = Math.sin(angle) * radius;
                this.z = 1500 + Math.random() * 2500;
                this.speed = 12 + Math.random() * 15;
                this.hue = Math.random();
            }
            update(speedMult) {
                this.z -= this.speed * speedMult;
                if (this.z <= 10) this.reset();
            }
            draw(speedMult, channelActivity) {
                const perspective = 800 / this.z;
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                
                const sx = cx + this.x * perspective;
                const sy = cy + this.y * perspective;
                
                const streakLen = this.speed * speedMult * 5 * perspective;
                const angle = Math.atan2(this.y, this.x);
                
                const hue = this.hue * 60 + channelActivity * 30;
                const alpha = Math.min(1, (1800 / this.z) * 0.9);
                
                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(sx - Math.cos(angle) * streakLen, sy - Math.sin(angle) * streakLen);
                ctx.strokeStyle = `hsla(${hue}, 80%, 70%, ${alpha})`;
                ctx.lineWidth = Math.max(1, 2.5 * perspective);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(sx, sy, Math.max(2, 4 * perspective), 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, 80%, ${alpha})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 200; i++) {
            warpStars.push(new WarpStar());
        }
        
        for (let i = 0; i < 20; i++) {
            gridLines.push(new GridLine(true));
            gridLines.push(new GridLine(false));
        }
        
        for (let i = 0; i < 50; i++) {
            streaks.push(new WarpStreak());
        }

        let reconnectAttempts = 0;
        const maxReconnectAttempts = 10;
        const baseReconnectDelay = 1000;

        function connect() {
            statusEl.textContent = "Connecting...";
            statusEl.className = "";
            ws = new WebSocket("ws://localhost:8765");

            ws.onopen = () => {
                statusEl.textContent = "Connected";
                statusEl.className = "connected";
                reconnectAttempts = 0;
            };

            ws.onclose = (e) => {
                statusEl.textContent = "Disconnected";
                statusEl.className = "disconnected";
                reconnectAttempts++;
                if (reconnectAttempts <= maxReconnectAttempts) {
                    const delay = Math.min(baseReconnectDelay * Math.pow(1.5, reconnectAttempts - 1), 30000);
                    statusEl.textContent = `Reconnecting (${reconnectAttempts})...`;
                    setTimeout(connect, delay);
                } else {
                    statusEl.textContent = "Connection failed - refresh to retry";
                }
            };

            ws.onerror = (e) => {
                statusEl.textContent = "Connection error";
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.means) targetChannelMeans = data.means;
                } catch(e) {}
            };
        }

        connect();

        function render() {
            time += 0.016;
            channelMeans.A1 += (targetChannelMeans.A1 - channelMeans.A1) * smoothFactor;
            channelMeans.C3 += (targetChannelMeans.C3 - channelMeans.C3) * smoothFactor;
            channelMeans.C4 += (targetChannelMeans.C4 - channelMeans.C4) * smoothFactor;
            channelMeans.A2 += (targetChannelMeans.A2 - channelMeans.A2) * smoothFactor;

            const activity = (Math.abs(channelMeans.A1) + Math.abs(channelMeans.C3) + Math.abs(channelMeans.C4) + Math.abs(channelMeans.A2)) / 400;
            const focus = Math.min(1, activity * 1.5);
            
            const speedMult = 0.3 + focus * 1.2;
            const channelActivity = (Math.abs(channelMeans.A1) + Math.abs(channelMeans.C3) + Math.abs(channelMeans.C4) + Math.abs(channelMeans.A2)) / 200;

            ctx.fillStyle = 'rgba(0, 0, 5, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(cx, cy));
            gradient.addColorStop(0, 'rgba(50, 100, 200, 0.15)');
            gradient.addColorStop(0.5, 'rgba(20, 40, 100, 0.1)');
            gradient.addColorStop(1, 'rgba(0, 0, 5, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.globalAlpha = 0.15 + focus * 0.2;
            gridLines.forEach(g => {
                g.update(speedMult);
                g.draw(speedMult);
            });
            ctx.globalAlpha = 1;

            ctx.globalAlpha = 0.25 + focus * 0.25;
            warpStars.forEach(s => {
                s.update(speedMult);
                s.draw(speedMult);
            });
            ctx.globalAlpha = 1;

            streaks.forEach(s => {
                s.update(speedMult);
                s.draw(speedMult, channelActivity);
            });

            ctx.globalAlpha = 0.15 + focus * 0.25;
            ctx.fillStyle = '#000010';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;

            channelsEl.innerHTML = `A1: ${channelMeans.A1.toFixed(2)}<br>C3: ${channelMeans.C3.toFixed(2)}<br>C4: ${channelMeans.C4.toFixed(2)}<br>A2: ${channelMeans.A2.toFixed(2)}`;

            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
